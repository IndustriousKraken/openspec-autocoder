# autocoder — example configuration.
#
# Copy this to `config.yaml` and edit the `url:` to point at YOUR repository.
# Assuming Claude Code is authenticated on this host (`claude auth login`)
# and a fine-grained GitHub PAT is exported as $GITHUB_TOKEN, this file
# is everything autocoder needs to start running.
#
# Optional capabilities (AI code review, ChatOps escalation, periodic
# audits) are commented out at the bottom — see the README sections of
# the same name to enable. Every field documented in the README's
# Configuration Reference appears below either active or as a comment;
# uncomment what you need.

repositories:
  - url: "git@github.com:your-org/your-repo.git"
    base_branch: main
    agent_branch: agent-q
    poll_interval_sec: 300
    # local_path is optional; if omitted, derived as
    # /tmp/workspaces/<sanitized-url> deterministically.
    # local_path: /tmp/workspaces/your-repo

    # Per-repository overrides. Each falls back to a global default when unset.
    #
    # Override the ChatOps escalation channel for this repo (falls back to
    # `chatops.default_channel_id`):
    # chatops_channel_id: C01234REPO
    #
    # Cap on archived changes committed in one iteration's PR (falls back
    # to `executor.max_changes_per_pr`, then 3):
    # max_changes_per_pr: 3
    #
    # Per-repo audit cadence overrides. Keys are audit type slugs (see the
    # `audits:` block below for the full list). Each entry overrides the
    # global `audits.defaults` cadence for this repo only. Cadence values:
    # `disabled`, `daily`, `every-N-days`, `weekly`, `monthly`, `quarterly`.
    # audits:
    #   architecture_brightline: weekly
    #
    # a006 per-repo OS-sandbox credential toggles (override executor.sandbox;
    # both default ON). A repo that develops CLI wrappers needs `os_hide` off
    # so a nested CLI can authenticate live — loosening is logged at startup.
    # a013: per-repo mask-list edits + strict mode (additive to the global
    # executor.sandbox values). `mask_add`/`mask_remove` edit the executor's
    # filesystem mask-list; `strict_mode` opts this repo's executor into the
    # masked-home allowlist. Removing a default mask entry is logged at startup.
    # sandbox:
    #   os_hide: false
    #   engine_deny: true
    #   mask_add: ["~/.config/myservice"]
    #   mask_remove: ["~/.ssh"]   # e.g. to develop an SSH tool (logged)
    #   strict_mode: false

    # ----------------------------------------------------------------
    # OSS-fork support (a26). See `docs/OPERATIONS.md`'s
    # "OSS contribution workflow" section for the full operator setup
    # — these three blocks combine to enable autocoder on a fork of
    # an upstream project the operator does NOT own.
    # ----------------------------------------------------------------
    #
    # `spec_storage.path` — when set, canonical specs live at
    # `<path>/openspec/` instead of `<workspace>/openspec/`. The path
    # is workspace-relative OR absolute; SHALL be a git working tree
    # containing an `openspec/` subdirectory (verified at config-load).
    # Default: unset (specs live alongside code).
    # spec_storage:
    #   path: "../my-specs"
    #   # a34: optional override for the git remote in the spec_storage
    #   # working tree that spec-only iterations push to. When unset, the
    #   # runtime uses `"origin"`. When set, config-load verifies the
    #   # remote exists in `git -C <spec_storage.path> remote` output.
    #   # push_remote: "origin"
    #   # a34: optional override for the PR base branch in the spec_storage
    #   # repo. When unset, the runtime queries
    #   # `git -C <spec_storage.path> symbolic-ref refs/remotes/<push_remote>/HEAD`
    #   # and parses the branch name. On query failure, falls back to "main".
    #   # base_branch: "main"
    #
    # `upstream` — when set, autocoder ensures a git remote named
    # `<remote>` (default `upstream`) points at `<url>` AND
    # opportunistically `git fetch <remote>` at iteration start.
    # Enables the `@<bot> sync-upstream <repo>` chatops verb that
    # rebases the workspace's base branch onto upstream's primary
    # branch on operator demand.
    # upstream:
    #   remote: upstream      # default
    #   branch: main          # default
    #   url: "https://github.com/upstream-org/upstream-project.git"
    #
    # `auto_submit_pr` — when `false`, autocoder pushes the agent
    # branch BUT skips the PR-creation API call, surfacing a
    # `gh pr create` command suggestion to chatops so the operator
    # can review locally before opening the upstream PR.
    # Default: `true` (existing auto-submit behavior).
    # auto_submit_pr: false

executor:
  # The default executor wraps the `claude` CLI (Claude Code) installed and
  # authenticated on this host. No API key in this file — authentication
  # lives in ~/.claude/ from `claude auth login`.
  kind: claude_cli
  # Override only if you have a wrapper script or `claude` is not on $PATH:
  # command: /usr/local/bin/claude
  timeout_secs: 1800
  # Optional tool-use sandbox. Absent → restrictive safe defaults apply
  # (blocks curl/wget/nc/ssh/scp/git-push, denies reads of ~/.ssh and
  # ~/.claude, allows only Read/Write/Edit/Glob/Grep/Bash tools).
  # Each field overrides its default independently; omitted fields keep
  # the safe default. See README's "Executor tool sandbox" section.
  #
  # sandbox:
  #   allowed_tools: [Read, Write, Edit, Glob, Grep, Bash]
  #   disallowed_bash_patterns:
  #     - "nc:*"
  #     - "ssh:*"
  #     - "git push:*"
  #   disallowed_read_paths:
  #     - "/home/*/.ssh/**"
  #     - "/home/*/.claude/**"
  #
  #   # --- a006 OS-level sandbox credential protection ---
  #   # Every agentic subprocess is wrapped in a kernel-enforced sandbox
  #   # (systemd-run service mode, or bwrap on non-systemd/unprivileged
  #   # hosts). Two credential-protection layers, each a toggle, BOTH default
  #   # ON. Per-repository values (repositories[].sandbox) override these.
  #   #
  #   # os_hide: filesystem allowlist — every CLI store OTHER than the running
  #   #   role's own is absent from the subprocess namespace (fail-closed). A
  #   #   repository that DEVELOPS CLI wrappers and needs a nested CLI to
  #   #   authenticate live must set this OFF (the `os_hide off / engine_deny
  #   #   on` preset); see docs/CONFIG.md.
  #   os_hide: true
  #   # engine_deny: extend the per-invocation tool-use denylist so the agent's
  #   #   Read/Bash tools are denied EVERY registered CLI store (self included).
  #   engine_deny: true
  #   # allow_unsandboxed: when NO platform-appropriate sandbox mechanism
  #   #   (Linux: systemd-run / bwrap; macOS: sandbox-exec) is available, agentic
  #   #   runs FAIL CLOSED unless this opt-in is true (a loud startup WARN is
  #   #   emitted when it is). Daemon-wide; NOT recommended.
  #   allow_unsandboxed: false
  #
  #   # --- a013 executor filesystem policy: denylist + strict mode ---
  #   # The executor runs under an EXPOSED-HOME DENYLIST: $HOME is present and
  #   # writable (so build toolchains under ~/.cargo, ~/.nvm, ~/.pyenv, … just
  #   # work) EXCEPT a default mask-list of sensitive paths (credentials AND
  #   # shell-init/persistence files) which are masked. Read-only roles (audits,
  #   # reviewer) always use the masked-home ALLOWLIST. Edit the mask-list:
  #   #
  #   # mask_add: extra paths to mask (~/ and $HOME/ expand to the home dir).
  #   mask_add:
  #     - "~/.config/myservice"
  #   # mask_remove: default entries to EXPOSE — e.g. ~/.ssh to develop an SSH
  #   #   tool. Removing a default is logged at startup as a relaxed posture
  #   #   (egress is unrestricted).
  #   mask_remove:
  #     - "~/.ssh"
  #   # strict_mode: run the EXECUTOR under the read-only-role allowlist (mask
  #   #   ALL of home; bind only the workspace, the role's own store, the
  #   #   resolved CLI binary + toolchain, and the minimal runtime) for
  #   #   high-compliance hosts. Defaults OFF; read-only roles always allowlist.
  #   strict_mode: false

  # --- a014 agent toolchain environment ---
  # The daemon captures the operator's ACTIVATED login-shell environment
  # (`bash -lic env`) at startup and injects it — credential-filtered — into
  # every agentic subprocess, so toolchains activated by shell init
  # (pyenv/rbenv/poetry/nvm: the shims on PATH, PYENV_ROOT/NVM_DIR, the
  # virtualenv) are USABLE, not merely present on disk under a013's exposed
  # home. A run-set variable (the sandbox/strategy env, e.g. ANTHROPIC_BASE_URL)
  # always wins over a captured one; a failed/partial capture degrades to the
  # base environment (it never aborts a run).
  #
  # agent_env:
  #   # capture: master switch (default ON). false → base environment only.
  #   capture: true
  #   # exclude_add: extra credential patterns withheld from the captured env,
  #   #   on top of the defaults (TOKEN/SECRET/KEY/PASSWORD substrings,
  #   #   AWS_/ANTHROPIC_ prefixes). An entry ending in `_` is a name prefix.
  #   exclude_add: ["GCP_", "COMPANYAUTH"]
  #   # exclude_remove: default patterns to drop so a matching name can pass —
  #   #   e.g. KEY to admit a *_KEY toolchain variable (a relaxed posture).
  #   exclude_remove: ["KEY"]
  #   # expected_toolchains: the set `autocoder doctor` runs `<tool> --version`
  #   #   against IN THE AGENT ENVIRONMENT, reporting any present-on-disk but
  #   #   not-runnable (the activation gap). Unset → python3, node, ruby, go.
  #   expected_toolchains: ["python3", "node", "ruby", "go"]

  # Path to a file overriding the built-in implementer prompt template.
  # The template must contain the literal `{{change_body}}` placeholder
  # (replaced with `openspec instructions apply` output each invocation).
  # Unset → use the prompt compiled into the binary.
  # implementer_prompt_path: /etc/autocoder/implementer.md

  # Path to a file overriding the built-in changelog-stylist prompt
  # template used by the `@<bot> changelog` chatops verb. Unset → use
  # the prompt compiled into the binary from `prompts/changelog-stylist.md`.
  # An empty file is rejected at startup so the daemon does not feed an
  # empty prompt to the wrapped CLI.
  # changelog_stylist_prompt_path: /etc/autocoder/changelog-stylist.md

  # --- Per-workspace nested prompt overrides (a24) ---
  #
  # Modernized form of the flat-suffix override fields above. Each
  # `prompt_path` is workspace-relative when not absolute; the uniform
  # PromptLoader walks per-workspace nested → per-workspace flat-
  # legacy → daemon-level flat-legacy → embedded fallback, and on a
  # configured-but-missing path it logs a one-shot WARN and falls
  # through. See docs/CONFIG.md `## Prompt overrides` for the full
  # registry table.
  #
  # implementer:
  #   prompt_path: ./prompts/implementer-custom.md
  # changelog_stylist:
  #   prompt_path: ./prompts/changelog-stylist-custom.md
  #
  # Three prompts whose only operator override is the nested form
  # (they had no daemon-level field before a24). Each is workspace-
  # relative; absent / unreadable / empty files fall back to the
  # embedded default with a one-shot WARN.
  #
  # implementer_revision:
  #   prompt_path: ./prompts/implementer-revision-custom.md
  # audit_triage:
  #   prompt_path: ./prompts/audit-triage-custom.md
  # chat_request_triage:
  #   prompt_path: ./prompts/chat-request-triage-custom.md

  # Consecutive Failed iterations after which a change is marked
  # perma-stuck (writes `.perma-stuck.json`, posts a chatops alert, and
  # is excluded from `list_pending` until the marker is removed). A
  # configured `0` is clamped to `1` with a WARN log at startup.
  # perma_stuck_after_failures: 2

  # Global default cap on archived changes committed in one iteration's
  # PR. Per-repo `max_changes_per_pr` (under `repositories[]`) overrides
  # this. A configured `0` is clamped to `1` with a WARN log at startup.
  # max_changes_per_pr: 3

  # Upper bound (in seconds) on the random sleep each polling task
  # performs before its first iteration. Staggers a fleet of concurrent
  # `git fetch` operations so an IDS does not see a synchronized burst.
  # `0` disables the startup jitter entirely.
  # startup_jitter_max_secs: 30

  # Percent (0..=100) of `poll_interval_sec` used as a uniform random
  # offset on every inter-iteration sleep. Prevents long-term
  # re-synchronization of multiple tasks. `0` produces exact intervals.
  # Values above 100 are clamped to 100.
  # inter_iteration_jitter_pct: 10

  # Maximum number of AUTOMATIC (reviewer-marked) revision rounds applied
  # to a single open PR before further automatic triggers are silently
  # ignored. Only revisions the code-reviewer auto-revise path posts (the
  # `<!-- reviewer-revision -->` comments) count against this cap. Human
  # `@<bot> revise` requests are bounded SEPARATELY by
  # `max_revise_triggers_per_pr` below (a000). Default `5`. `0` disables
  # the PR-comment revision channel entirely. Values above `20` are clamped
  # to `20` with a WARN log at startup.
  # The legacy key `max_revisions_per_pr` is still accepted as a silent
  # alias (existing configs load unchanged).
  # max_auto_revisions_per_pr: 5

  # a000: per-PR cap on HUMAN-initiated `@<bot> revise` triggers acted on.
  # Distinct from `max_auto_revisions_per_pr` (reviewer-initiated
  # revisions) AND `reviewer.max_code_reviews_per_pr` (re-reviews). Closes
  # the previously-uncapped human-revise path: past this many authorized
  # human revisions on one PR, further `@<bot> revise` triggers are
  # declined (one notice) without invoking the executor. The count lives in
  # the per-PR state file; the cap is read live from config. Default `10`.
  # max_revise_triggers_per_pr: 10

  # Seconds the `@<bot> wipe-workspace` flow waits for the in-flight
  # per-repo polling iteration to drain (release its busy marker) after
  # the operator types `confirm`. The wipe runs regardless of whether
  # the drain completes within the window. Defaults to `30`. Values
  # above `300` (5 minutes) are clamped to `300` with a WARN log at
  # startup — a longer wait holds the chatops listener busy for too
  # long and almost always indicates misconfiguration.
  # wipe_drain_timeout_secs: 30

  # Output format for the wrapped Claude CLI. `json` (the default)
  # invokes the CLI with `--output-format stream-json` and writes a
  # structured per-change log with PROMPT / ACTIONS / FINAL ANSWER /
  # STDERR sections — operators can read the ACTIONS section after a
  # timeout-kill to see what the agent was doing. `text` opts out
  # entirely: legacy at-exit capture with PROMPT / STDOUT / STDERR
  # sections (today's 0-bytes-on-timeout shape).
  # output_format: json

  # Per-change run-log retention window (days). At daemon startup and
  # every 24 hours during operation, logs older than this window whose
  # change directory is no longer active under
  # `openspec/changes/<change>/` are deleted. Active changes' logs are
  # always preserved regardless of age. Default `30`. Clamped at `365`.
  # log_retention_days: 30

  # Stale-threshold (in seconds) for the live-PID busy-marker recovery
  # branch. A polling iteration that finds an existing marker whose
  # recorded PID is still alive AND older than this value treats the
  # pass as stuck: SIGTERMs the process group, waits 5s, SIGKILLs if
  # still alive, clears the marker, and proceeds. Default `600` (10
  # minutes). Decoupled from `executor.timeout_secs` — raising the
  # executor timeout for one legitimately long-running change does
  # NOT delay stale-marker recovery on unrelated iterations.
  #
  # DEAD-PID markers (recorded PID no longer in `/proc`) are recovered
  # IMMEDIATELY regardless of this value; this field only gates the
  # live-PID branch.
  #
  # Value `0` is permitted (every live-PID marker is then treated as
  # stale on inspection — useful for diagnostics). Values above `7200`
  # (2 hours) are clamped to `7200` with a WARN log at startup.
  # busy_marker_stale_threshold_secs: 600

  # ─────────────────────────────────────────────────────────────────
  # Change-internal contradiction pre-flight (a19; opt-in).
  #
  # A second pre-executor pre-flight, layered AFTER the mechanical
  # archivability check. Where archivability catches structural defects
  # (a MODIFIED title not present in canonical), the contradiction
  # check catches semantic ones: a change whose requirements are
  # individually well-formed but contradict each other (e.g. ADDED A
  # "all secrets in env vars" + ADDED B "API key in config.yaml").
  #
  # TRANSPORT (a59/a62/a63): this gate AND its two siblings below (the
  # `[canon]` and `[out]` gates) run AGENTICALLY — a wrapped CLI session — NOT
  # one-shot HTTP calls. The LLM block's `provider` selects the CLI:
  # `anthropic`→`claude`, `openai_compatible`/`ollama`→`opencode`,
  # `google`→`antigravity` (the selected CLI must be installed). The agent reads
  # the relevant files on demand in a read-only sandbox AND returns its result
  # via an MCP `submit_*` tool over the daemon's control socket (so that socket
  # must be reachable inside the OS sandbox — it is, by default). `api_key_env` /
  # `api_base_url` configure the provider the resolved CLI uses, AND `model` may
  # name a top-level `models:` nickname. Failures (CLI unavailable, no
  # submission) fail OPEN — log a WARN AND proceed; the daemon does NOT gate
  # work on a failed check.
  #
  # Disabled by default. To enable, set the mode below AND configure the
  # LLM block. Enabling without configuring the LLM block is a fail-fast
  # startup error.
  #
  # See docs/OPERATIONS.md § "Pre-flight checks" for the full design.
  # change_internal_contradiction_check: disabled   # | enabled
  #
  # Optional override for the embedded prompt template. Unset → the
  # prompt compiled into the binary from
  # `prompts/change-contradiction-check.md` is used. An empty override
  # file is rejected at use time.
  # change_internal_contradiction_check_prompt_path: /etc/autocoder/prompts/contradiction-check.md
  #
  # Required when the check is enabled. Parallel to the `reviewer:` LLM
  # surface (provider | model | api_key_env | api_key | api_base_url)
  # but kept as its own block so operators can pick a cheaper model.
  # change_internal_contradiction_check_llm:
  #   provider: anthropic               # `anthropic` | `openai_compatible` | `ollama`
  #   model: claude-haiku-4-5-20251001  # cheap; the prompt is small
  #   api_key_env: ANTHROPIC_API_KEY    # OPTIONAL for these CLI/agentic gates — the CLI
  #                                     # self-authenticates; a key is required only for an
  #                                     # in-process HTTP consumer (oneshot reviewer / RAG).
  #   # Inline alternative: when `api_key` is set, `api_key_env` is ignored.
  #   # api_key:
  #   #   value: "sk-ant-yourkeyhere"
  #   # api_base_url: https://api.anthropic.com
  #   #                                 # provider endpoint the resolved CLI uses
  #   #                                 # (a custom base for the selected
  #   #                                 # anthropic/openai_compatible/ollama
  #   #                                 # provider); omit for the provider default.
  #
  # --- The [canon] gate: change-vs-canonical contradiction pre-flight ---
  #
  # The sibling of the check above (the [in] gate). Where the [in] gate
  # catches a change that contradicts ITSELF, the [canon] gate catches a
  # change that contradicts an ALREADY-canonical requirement (a delta that
  # re-specifies a behavior the project has locked elsewhere). Same
  # lifecycle position (pre-executor), same opt-in + fail-open posture.
  # Reads the change's spec-deltas AND `openspec/specs/*/spec.md` (and uses
  # `query_canonical_specs` when canonical_rag is enabled).
  #
  # Disabled by default. To enable, set the mode below AND configure the
  # LLM block. Enabling without configuring the LLM block is a fail-fast
  # startup error.
  # change_canonical_contradiction_check: disabled   # | enabled
  #
  # Optional override for the embedded prompt template. Unset → the prompt
  # compiled into the binary from `prompts/change-vs-canonical-check.md` is
  # used. An empty override file is rejected at use time.
  # change_canonical_contradiction_check_prompt_path: /etc/autocoder/prompts/change-vs-canonical-check.md
  #
  # Required when the check is enabled. Same surface as the [in] gate's LLM
  # block (provider | model | api_key_env | api_key | api_base_url).
  # change_canonical_contradiction_check_llm:
  #   provider: anthropic               # `anthropic` | `openai_compatible` | `ollama`
  #   model: claude-haiku-4-5-20251001  # cheap; the prompt is small
  #   api_key_env: ANTHROPIC_API_KEY    # OPTIONAL for these CLI/agentic gates — the CLI
  #                                     # self-authenticates; a key is required only for an
  #                                     # in-process HTTP consumer (oneshot reviewer / RAG).
  #
  # Code-implements-spec verification — the `[out]` gate of the verifier
  # framework (a63). Runs AFTER the executor implements a change, in a
  # read-only sandbox, AND judges — requirement by requirement, scenario by
  # scenario — whether the implementation satisfies the change's spec delta.
  # ADVISORY: it renders a `## Spec Verification` section into the PR body
  # (parallel to the reviewer's `## Code Review` block) AND posts a chatops
  # note ONLY when gaps are found. It NEVER opens a revision AND NEVER blocks
  # PR creation — the operator reads the verification and decides.
  #
  # Disabled by default. To enable, set the mode below AND configure the
  # LLM block. Enabling without configuring the LLM block is a fail-fast
  # startup error.
  # code_implements_spec_check: disabled   # | enabled
  #
  # Optional override for the embedded prompt template. Unset → the prompt
  # compiled into the binary from `prompts/code-implements-spec-check.md` is
  # used. An empty override file is rejected at use time.
  # code_implements_spec_check_prompt_path: /etc/autocoder/prompts/code-implements-spec-check.md
  #
  # Required when the check is enabled. Same surface as the pre-executor
  # gates' LLM block (provider | model | api_key_env | api_key | api_base_url).
  # code_implements_spec_check_llm:
  #   provider: anthropic               # `anthropic` | `openai_compatible` | `ollama`
  #   model: claude-haiku-4-5-20251001  # cheap; the prompt is small
  #   api_key_env: ANTHROPIC_API_KEY    # OPTIONAL for these CLI/agentic gates — the CLI
  #                                     # self-authenticates; a key is required only for an
  #                                     # in-process HTTP consumer (oneshot reviewer / RAG).

github:
  # Name of the env var holding the GitHub PAT. The token is read once
  # per PR creation; never logged.
  token_env: GITHUB_TOKEN
  # Inline alternative: put the PAT directly in this file instead of an
  # env var. When `token` is set, `token_env` is ignored. Recommended only
  # when ~/config.yaml is chmod 600 and you accept secrets-in-YAML.
  # See README's "Secrets in config.yaml" section.
  #
  # token:
  #   value: "github_pat_yourtokenhere"
  #
  # Optional: route per-owner PATs by GitHub owner name. Fine-grained PATs
  # can only be issued by the owner of a resource (personal account or org
  # admin), so multi-account operators need one PAT per owner. Each map
  # value can be a bare string (env var name) OR `{ value: "..." }` for
  # inline. The resolver picks the matching entry case-insensitively. Any
  # repository whose owner has no entry falls back to `token` / `token_env`.
  # See README's "Multiple GitHub Tokens" section.
  #
  # owner_tokens:
  #   your-personal-handle: PERSONAL_GH_TOKEN        # env var name
  #   my-org-a: ORG_A_GH_TOKEN                       # env var name
  #   my-org-b:                                      # inline
  #     value: "github_pat_xxx_for_org_b"

  # Optional: enable fork-and-PR mode. autocoder pushes the agent branch to
  # a fork owned by this handle and opens cross-repo PRs against upstream.
  # The machine user only needs READ access on upstream. See README's
  # "Fork-and-PR workflow" section for one-time fork-setup steps.
  #
  # fork_owner: my-machine-user-handle

  # DESTRUCTIVE — when `true` AND fork-PR mode is active AND the workspace
  # directory was absent at iteration start, autocoder DELETES the existing
  # fork on GitHub and re-forks upstream before initializing. Any open PRs
  # whose head branch lives on the deleted fork are closed by GitHub when
  # the head ref disappears. Requires the PAT to include the `delete_repo`
  # scope. See README's "Fork recreation on workspace reinitialization"
  # section before enabling.
  #
  # recreate_fork_on_reinit: false

  # a000: authorize who may trigger GitHub comment-sourced verbs
  # (`@<bot> revise`, `@<bot> code-review`, and any future comment verb).
  # Before dispatching such a verb, the daemon checks the commenter:
  # authorization passes when EITHER the comment's GitHub
  # `author_association` is in `allowed_associations` OR the author's
  # `login` is in `allowed_users`. Unauthorized comments are dropped before
  # any executor/reviewer work (default-deny) and the seen-marker is
  # advanced so they do not re-fire. This is the GitHub analog of the Slack
  # channel allowlist; the Slack path is unaffected.
  #
  # When omitted entirely, the default-deny block below applies:
  #   allowed_associations: [OWNER, MEMBER, COLLABORATOR]  # write/triage
  #   allowed_users: []                                    # extra trusted logins
  #   decline_comment: false   # true posts ONE polite decline reply per drop
  #
  # `allowed_associations` entries are validated at startup against the
  # GitHub set (OWNER, MEMBER, COLLABORATOR, CONTRIBUTOR,
  # FIRST_TIME_CONTRIBUTOR, FIRST_TIMER, NONE); an unknown value fails load.
  #
  # command_authorization:
  #   allowed_associations: [OWNER, MEMBER, COLLABORATOR]
  #   allowed_users: [trusted-maintainer-handle]
  #   decline_comment: false

# -------------------------------------------------------------------------
# Optional capabilities — disabled by default. Uncomment to enable.
# -------------------------------------------------------------------------

# Optional top-level model registry. Define a model ONCE under a nickname,
# then reference it by name from any LLM-consuming block (`reviewer:`,
# `canonical_rag:`, `executor.change_internal_contradiction_check_llm:`).
# A block that OMITS `provider` has its `model:` interpreted as a nickname
# and resolved to the registry entry's full (provider, model, api_base_url,
# api_key) tuple. A block that SETS `provider` inline is the legacy form and
# is NOT consulted against the registry — inline blocks remain valid forever.
# Each entry's `provider` also fixes the default agentic CLI: `anthropic` →
# the `claude` CLI; `openai_compatible` / `ollama` → the `opencode` CLI; the
# optional per-entry `cli:` overrides that default.
#
# models:
#   beefy_security:
#     provider: openai_compatible
#     model: moonshotai/kimi-k2
#     api_base_url: https://openrouter.ai/api/v1
#     api_key_env: OPENROUTER_KEY
#     # cli: opencode                     # optional; default for openai_compatible
#   fast_local:
#     provider: ollama
#     model: qwen2.5-coder:32b
#     api_base_url: http://localhost:11434
#     # no api_key — Ollama does not authenticate
#
# With the registry above, a role can reference a nickname (no `provider:`)…
# reviewer:
#   enabled: true
#   model: beefy_security                 # no `provider:` → registry nickname
# …while another role stays legacy inline (`provider:` present, registry
# not consulted):
# change_internal_contradiction_check_llm:
#   provider: anthropic
#   model: claude-opus-4-8
#   api_key_env: ANTHROPIC_API_KEY

# AI code-quality review of each PR. See README's "Code Review" section
# for scope (code quality, NOT spec compliance), supported providers, and
# branch-protection recommendations to enforce Block verdicts.
#
# reviewer:
#   enabled: true
#   provider: anthropic                 # supported: `anthropic` | `openai_compatible` | `ollama`
#   model: claude-sonnet-4-6            # provider-specific model name
#   api_key_env: ANTHROPIC_API_KEY      # env var holding the API token
#                                       # NOTE: api_key (inline or env) is REQUIRED
#                                       # for `anthropic` AND `openai_compatible`,
#                                       # AND FORBIDDEN for `ollama` (rejected at
#                                       # config-load — Ollama does not authenticate).
#   # Inline alternative: put the API key directly in this file. When
#   # `api_key` is set, `api_key_env` is ignored. Same chmod-600 caveat.
#   # api_key:
#   #   value: "sk-ant-yourkeyhere"
#   # api_base_url:                     # the API ROOT; the client appends its
#   #                                   # protocol-specific path:
#   #                                   #   anthropic         → <base>/v1/messages
#   #                                   #   openai_compatible → <base>/chat/completions
#   #                                   #   ollama            → <base>/api/chat
#   #                                   # Anthropic: OPTIONAL (defaults to
#   #                                   # https://api.anthropic.com).
#   #                                   # openai_compatible AND ollama: REQUIRED
#   #                                   # (include `/v1` in the base for hosted
#   #                                   # services that require it; bare host for
#   #                                   # local Ollama).
#   #
#   # Local Ollama for the reviewer (example):
#   # reviewer:
#   #   enabled: true
#   #   provider: ollama
#   #   model: qwen2.5-coder:32b
#   #   api_base_url: http://localhost:11434
#   #   # no api_key — Ollama does not authenticate
#   #   prompt_budget_chars: 300000
#   #   mode: per_change
#   #
#   # Reviewer transport. `agentic` (the default since a64) runs the
#   # reviewer as a read-only CLI-wrapped session (via the `command`
#   # CLI below) that reads files on demand and returns its verdict
#   # through the `submit_review` MCP tool — no 2M-char prompt-budget
#   # truncation, schema-validated verdict, discard-and-alert instead of
#   # default-approve. `oneshot` is the legacy single-shot HTTP path that
#   # pre-dumps every touched file into one prompt. When the effective
#   # kind is `agentic` but the resolved reviewer CLI (`command`, resolved
#   # per provider: anthropic → `claude`, others → `opencode`) is not
#   # installed on the daemon host, the reviewer logs one startup WARN and
#   # degrades to the `oneshot` HTTP path for that boot — review is never
#   # disabled. Set `kind: oneshot` to opt out of agentic and silence the
#   # warning. Re-evaluated on restart / `autocoder reload`.
#   # kind: agentic
#   # command: claude        # the agentic CLI binary; default `claude`
#   #
#   # Reviewer-initiated revisions on actionable concerns. Tri-state:
#   #   block      (default) fire only when the verdict is `Block`
#   #              (security-critical findings escalate to `Block`, so they
#   #              auto-fix; non-`Block` `Concerns` stay advisory).
#   #   actionable fire on any actionable concern regardless of verdict.
#   #   off        never fire.
#   # When it fires, ALL of a review's concerns marked
#   # `should_request_revision: true` (with a non-empty `actionable_request`)
#   # are AGGREGATED into ONE `<!-- reviewer-revision -->` PR comment that
#   # the dispatcher picks up as a SINGLE revision run on the next polling
#   # iteration — one `executor.max_auto_revisions_per_pr` slot per review,
#   # not per concern. Requires `executor.max_auto_revisions_per_pr > 0`;
#   # operator-customized reviewer templates must emit the per-concern
#   # `revision-requests` fields. The legacy boolean is mapped
#   # (`true` -> `actionable`, `false` -> `off`) and the legacy key
#   # `auto_revise_on_block` is still accepted as an alias.
#   # auto_revise: block
#   #
#   # Maximum size (in chars) of the rendered reviewer prompt body —
#   # change context + changed files + diff combined. Default 2000000
#   # preserves historical behavior. No hard ceiling; the operator is
#   # responsible for matching this to their LLM provider's context
#   # window (Grok-4 / Claude Sonnet 4.6 fit 4000000+; tighter caps
#   # suit smaller-window providers like older Ollama deployments).
#   # YAML integers do NOT accept underscore separators — write plain
#   # decimals (`4000000`, not `4_000_000`).
#   # See `docs/CODE-REVIEW.md` § "Prompt budget".
#   # prompt_budget_chars: 2000000
#   #
#   # Reviewer dispatch mode. `bundled` (default) keeps today's single
#   # reviewer call per PR. `per_change` dispatches one reviewer call
#   # per change in a multi-change PR and emits one
#   # `## Code Review: <slug>` section per change in the PR body. The
#   # LLM cost scales linearly with the number of changes; use only if
#   # you specifically want per-change attention.
#   # See `docs/CODE-REVIEW.md` § "Per-change reviewer mode".
#   # mode: bundled
#   #
#   # Per-PR cap on operator-initiated re-reviews triggered via the
#   # `@<bot> code-review` PR-comment verb. UNLIMITED by default (unset):
#   # every re-review is a deliberate operator action and there is no
#   # automatic re-review path, so there is no runaway to bound. Set a
#   # positive integer to impose an opt-in ceiling (the Nth+1 `code-review`
#   # then posts a one-time decline). Values above 20 are clamped down at
#   # startup with a WARN. The original automatic review at PR-open time
#   # does NOT count against this cap. Independent of
#   # `executor.max_auto_revisions_per_pr` — re-reviews are a separate cost
#   # surface (one LLM call) from revisions (full executor subprocess).
#   # max_code_reviews_per_pr: 5   # unset = unlimited (opt-in ceiling)
#   #
#   # Optional diff-overlap threshold for re-review suggestion. Unset
#   # (the default) disables the suggestion entirely. When set in the
#   # range `0.0..=1.0`, the daemon posts a chatops `💡 ...` notification
#   # after a revision iteration whose cumulative-since-original-review
#   # diff overlap exceeds the threshold. `0.5` is a reasonable starting
#   # point ("suggest when half the original diff has been revised").
#   # `0.0` means "suggest after any non-zero revision" (noisy in
#   # practice). `1.0` means "suggest only when the revised diff is
#   # equal-or-larger than the original" (conservative). The suggestion
#   # is informational; the operator decides whether to post
#   # `@<bot> code-review`. Out-of-range values fail config-load.
#   # suggest_rereview_threshold: 0.5
#   #
#   # a34: cost-optimization knob. When `true`, the polling iteration's
#   # reviewer-invocation step skips the reviewer call AND posts no
#   # `## Code Review` section for any PR whose ENTIRE diff lives under
#   # `openspec/` (spec-only PRs from brownfield, scout spec-it, OR
#   # archive-driven iterations). Default `false` (reviewer runs on every PR).
#   # skip_spec_only_prs: false
#   #
#   # Nested override for the reviewer's prompt template (a24).
#   # Workspace-relative when not absolute. Preferred over the legacy
#   # flat `reviewer.prompt_template_path` field. Missing/empty files
#   # emit a one-shot WARN and fall back to the embedded default.
#   # code_review:
#   #   prompt_path: ./prompts/code-review-custom.md

# ChatOps escalation — when the agent can't proceed without human
# input, post the question to a chat provider and resume on reply.
# Slack is the officially-supported provider. Discord, Teams, Mattermost,
# and Matrix are EXPERIMENTAL: best-effort support, no API-stability
# guarantees, may break without notice. See README's "ChatOps Escalation"
# and "Experimental ChatOps Backends" sections for setup details.
#
# chatops:
#   provider: slack                # required: slack | discord | teams | mattermost | matrix
#   default_channel_id: C0123456789  # provider-native channel id
#   slack:
#     bot_token_env: SLACK_BOT_TOKEN
#     # Inline alternative: when `bot_token` is set, `bot_token_env` is ignored.
#     # bot_token:
#     #   value: "xoxb-yourtokenhere"
#     #
#     # OPTIONAL: Socket Mode app-level token (xapp-*). When set, autocoder
#     # spawns an inbound listener that handles `@autocoder <verb>` operator
#     # commands (`status`, `clear-perma-stuck`, `wipe-workspace`, etc.) and
#     # posts threaded replies. When absent, outbound chatops still works
#     # but the operator commands documented in the README are not handled.
#     # See README "ChatOps operator commands" → "Setup" for the Slack app
#     # configuration steps (Socket Mode toggle, OAuth scopes, token gen).
#     # app_token_env: SLACK_APP_TOKEN
#     # # Inline alternative:
#     # # app_token:
#     # #   value: "xapp-1-..."
#     #
#     # OPTIONAL: extra channel IDs the inbound listener will honor
#     # commands in, on top of every `repositories[].chatops_channel_id`
#     # and `chatops.default_channel_id`. Messages from channels not in
#     # the resulting allowlist are silently dropped (no `?` reaction).
#     # listen_channels: ["C0OPS", "C0OPS2"]
#
#     # OPTIONAL: dedup-cache tuning. Slack's Socket Mode delivery is
#     # at-least-once; the listener remembers recently-processed
#     # `app_mention` events keyed by `(channel, ts, user)` and skips
#     # the dispatch on redelivery so a single operator command never
#     # produces a duplicate bot reply. Capacity defaults to `100`
#     # (max `10000`; `0` disables dedup); TTL defaults to `600`
#     # seconds (max `3600`). Raise for high-traffic channels.
#     # dedup_cache_capacity: 100
#     # dedup_cache_ttl_secs: 600
#
#   # Progress notifications. Each key defaults to `true` when the block is
#   # omitted. Set any to `false` to suppress that stream.
#   #   start_work: a one-line message each time autocoder picks up a change.
#   #   failure_alerts: throttled (≤1/24h per repo+category) alerts for
#   #     predictable infrastructure failures (workspace init, branch push,
#   #     PR creation 4xx). Cleared on the next successful iteration.
#   #   pr_opened: a message each time autocoder opens a new pull request.
#   # notifications:
#   #   start_work: true
#   #   failure_alerts: true
#   #   pr_opened: true
#
#   # ---------------------------------------------------------------
#   # EXPERIMENTAL alternatives — pick ONE provider and uncomment the
#   # matching sub-block. Unselected sub-blocks are tolerated but ignored.
#   # ---------------------------------------------------------------
#
#   # EXPERIMENTAL: Discord. Bot auth via `Authorization: Bot <token>`.
#   # discord:
#   #   bot_token_env: DISCORD_BOT_TOKEN
#
#   # EXPERIMENTAL: Microsoft Teams via Graph + OAuth client_credentials.
#   # teams:
#   #   tenant_id: "11111111-2222-3333-4444-555555555555"
#   #   client_id: "66666666-7777-8888-9999-aaaaaaaaaaaa"
#   #   client_secret_env: TEAMS_CLIENT_SECRET
#   #   team_id: "bbbbbbbb-cccc-dddd-eeee-ffffffffffff"
#
#   # EXPERIMENTAL: Mattermost. PAT auth via `Authorization: Bearer <token>`.
#   # mattermost:
#   #   server_url: "https://mattermost.example.com"
#   #   access_token_env: MATTERMOST_TOKEN
#
#   # EXPERIMENTAL: Matrix Client-Server API. Bearer-token auth.
#   # matrix:
#   #   homeserver_url: "https://matrix.example.com"
#   #   access_token_env: MATRIX_ACCESS_TOKEN

# Periodic audits — long-cycle background checks orchestrated by the
# daemon between regular polling iterations. Eight audits ship today:
#   - architecture_brightline    — flags files exceeding a line-count threshold
#   - drift_audit                — detects spec/code drift via LLM scan
#   - missing_tests_audit        — proposes test coverage for untested code
#   - security_bug_audit         — LLM scan for security smells
#   - architecture_consultative  — LLM architectural-health review
#   - documentation_audit        — LLM docs coverage / stale-reference / organization check
#   - canon_contradiction_audit  — LLM scan for two canonical requirements that cannot both hold
#   - canon_consolidation_audit  — LLM scan for redundant canonical requirements; drafts a consolidate- change
#
# Cadence vocabulary (per audit; default `disabled`):
#   disabled | daily | every-N-days | weekly | monthly | quarterly
#
# When the entire `audits:` block is absent, every audit resolves to
# `Disabled` and the scheduler does no work. Operators opt in explicitly
# by listing audit type names with a non-`disabled` cadence under
# `audits.defaults`. Per-repo overrides live under `repositories[].audits`.
#
# audits:
#   # Global default cadence per audit type. Omitted entries → `Disabled`.
#   defaults:
#     architecture_brightline: weekly
#     drift_audit: weekly
#     missing_tests_audit: monthly
#     security_bug_audit: weekly
#     architecture_consultative: quarterly
#     documentation_audit: monthly
#     canon_contradiction_audit: monthly   # whole-canon scope → heavy default
#     canon_consolidation_audit: monthly   # rewrites canon → heavy default
#
#   # Per-audit knobs. `prompt_path` overrides the audit's embedded LLM
#   # prompt template. `notify_on_clean` toggles a brief "no findings"
#   # chatops post for empty-result outcomes (silence is success by
#   # default). `extra` is a free-form mapping each audit reads its own
#   # thresholds out of — keys documented per audit below.
#   settings:
#     architecture_brightline:
#       # prompt_path: /etc/autocoder/prompts/brightline.md
#       notify_on_clean: false
#       extra:
#         file_lines_threshold: 500   # WARN any file with > N lines
#     drift_audit:
#       # prompt_path: /etc/autocoder/prompts/drift.md
#       notify_on_clean: false
#       extra: {}
#     missing_tests_audit:
#       # prompt_path: /etc/autocoder/prompts/missing-tests.md
#       notify_on_clean: false
#       extra:
#         max_proposals_per_run: 3    # cap change proposals opened per run
#     security_bug_audit:
#       # prompt_path: /etc/autocoder/prompts/security-bug.md
#       notify_on_clean: false
#       extra:
#         max_proposals_per_run: 3
#     architecture_consultative:
#       # prompt_path: /etc/autocoder/prompts/arch-consult.md
#       notify_on_clean: false
#       extra: {}
#     documentation_audit:
#       # prompt_path: /etc/autocoder/prompts/documentation-audit.md
#       notify_on_clean: false
#       extra:
#         readme_max_lines: 200             # threshold for "README too long" finding
#         page_max_lines_without_toc: 500   # threshold for "missing TOC" finding
#     canon_contradiction_audit:
#       # prompt_path: /etc/autocoder/prompts/canon-contradiction-audit.md
#       notify_on_clean: false
#       extra:
#         retrieval_breadth: 8        # nearest requirements retrieved per requirement (RAG on)
#         max_findings_per_run: 20    # cap on findings surfaced per run (overflow surfaces later)
#     canon_consolidation_audit:
#       # prompt_path: /etc/autocoder/prompts/canon-consolidation-audit.md
#       notify_on_clean: false
#       extra:
#         retrieval_breadth: 8        # nearest requirements retrieved per requirement (RAG on)
#         max_proposals_per_run: 1    # cap on consolidate- changes drafted per run (dense to review)
#
#   # Number of retry attempts after an LLM-driven audit's generated
#   # proposal fails `openspec validate --strict`. Each retry re-invokes
#   # the audit's LLM with the validation error appended to the prompt.
#   # `0` disables retries (first failure → ValidationExhausted, discard,
#   # chatops failure notification). Values above `5` are clamped down at
#   # startup with a WARN log. Default: 1.
#   max_validation_retries: 1
#
#   # Per-iteration cap on how many audits run before the scheduler
#   # returns control to the iteration loop. When many audits become
#   # eligible at once (typical pattern: a HEAD change unblocks every
#   # `requires_head_change` audit simultaneously), the default `1` keeps
#   # them from running back-to-back inside one iteration — instead they
#   # stagger across iterations so pending-change work continues to share
#   # each cycle's wall-clock. Both cadence-driven AND on-demand queued
#   # runs (from chatops `@<bot> audit <name>`) count against the bound.
#   # Values above the number of registered audits clamp at the registry
#   # count with a WARN log. Value `0` is permitted and disables audits
#   # behaviourally (every iteration skips the audit phase — useful for
#   # diagnostics or temporary silencing). Default: 1.
#   max_audits_per_iteration: 1

# Daemon data directories. Each field is optional; absent fields fall
# through to (in order): AUTOCODER_*_DIR env vars → systemd-set
# $STATE_DIRECTORY family (auto-populated when running under the unit
# template) → XDG defaults under $HOME (dev mode) → hard fallback to
# `/var/lib/autocoder` etc. The four roles must resolve to distinct
# directories — same path for two roles is rejected at startup.
#
# Categories:
#   state    — persistent state (audit cadence, failure counters,
#              revisions, alert throttles). Survives reboot.
#   cache    — repo workspaces (re-clonable but kept). Survives reboot.
#   logs     — per-change run logs + audit logs. Survives reboot.
#   runtime  — control socket, transient pid/lock files. Cleared on
#              reboot by design.
#
# paths:
#   state_dir: /var/lib/autocoder
#   cache_dir: /var/cache/autocoder
#   logs_dir: /var/log/autocoder
#   runtime_dir: /run/autocoder

# Workspace-cache bounding (a65). Optional top-level block. Per-repo
# workspaces under `<cache>/workspaces/<key>` accumulate a build-artifact
# tree (a Rust repo's multi-GB `target/debug`, a Node repo's
# `node_modules/`, …) with no bound. Left unset, the cache is UNBOUNDED
# (today's behaviour) and a daemon running several repos long enough can
# fill its disk — the daemon logs a one-time startup notice in this case.
#
# When `workspaces_max_gb` is set, at each repo's iteration start the
# daemon measures the total `<cache>/workspaces/` size; if it exceeds the
# cap, it evicts whole least-recently-used IDLE workspaces (oldest
# last-used first) until under the cap. Eviction is language-agnostic
# (it removes entire clones, not just `target/`/`node_modules/`) AND
# lossless: an evicted repo re-clones on its next iteration, and per-PR
# revision + audit state live under `<state>/`, not the workspace. The
# repo currently iterating AND any workspace holding a busy marker are
# never evicted. A value of `0` is rejected — omit the field for an
# unbounded cache.
#
# cache:
#   workspaces_max_gb: 50

# Per-workspace feature flags (a23 + future). Each sub-block is opt-in;
# absent sub-blocks take their type-default behaviour. Omit the entire
# `features:` block to take every default.
#
# features:
#   brownfield:
#     # When `false`, the chatops dispatcher refuses `@<bot> brownfield ...`
#     # at parse time with the documented "disabled in this workspace's
#     # config" message. Default: true.
#     # enabled: true
#
#     # Workspace-relative path to a custom brownfield-draft prompt
#     # template. When set AND the file exists at run time, the polling
#     # handler uses it instead of the embedded `prompts/brownfield-draft.md`
#     # template. When set BUT the file is missing OR unreadable, the
#     # handler logs a WARN naming the path AND falls back to the
#     # embedded default. Default: null (use embedded).
#     # prompt_path: ./prompts/brownfield-custom.md
#
#   scout:
#     # When `false`, the chatops dispatcher refuses `@<bot> scout`,
#     # `@<bot> spec-it`, AND `@<bot> clear-scout` at parse time. Default: true.
#     # enabled: true
#
#     # Workspace-relative path to a custom scout prompt template.
#     # Resolved via the uniform Prompt overrides table (see docs/CONFIG.md).
#     # Default: null (use the embedded `prompts/scout.md`).
#     # prompt_path: ./prompts/scout-custom.md
#
#     # Cap on the scout's returned opportunity list. Valid range 1..=50.
#     # Default: 30.
#     # max_items: 30
#
#     # When `true`, the scout handler attempts `gh api repos/<owner>/<repo>/issues?state=open`.
#     # On failure (auth, rate limit, network), a WARN logs AND scout
#     # proceeds with code-derived items only. Default: true.
#     # include_issues: true
#
#     # When `spec-it` references a scout older than this many days OR
#     # the workspace HEAD has drifted from the scout's recorded HEAD,
#     # the polling handler posts a one-time warning naming the gap.
#     # The warning does NOT block. Default: 7.
#     # staleness_warn_days: 7
#
#   brownfield_survey:
#     # When `false`, the chatops dispatcher refuses `@<bot> brownfield-survey`,
#     # `@<bot> clear-survey`, AND `@<bot> send it` in survey threads at
#     # parse time. Default: true.
#     # enabled: true
#
#     # Workspace-relative path to a custom brownfield-survey prompt
#     # template. Resolved via the uniform Prompt overrides table.
#     # Default: null (use the embedded `prompts/brownfield-survey.md`).
#     # prompt_path: ./prompts/brownfield-survey-custom.md
#
#     # Cap on the survey's returned proposed-capability list. Valid
#     # range 1..=50. Default: 20.
#     # max_capabilities: 20
#
#   issues:
#     # The issues lane (a009/a010). UNLIKE the chatops-verb features above —
#     # which are inert until explicitly invoked — enabling this changes the
#     # daemon's behavior autonomously, so it is OFF by default and opt-in.
#     #
#     # When `true`, two things turn on:
#     #   1. Lane processing. Per-iteration unit selection becomes
#     #      `issues > changes > audits`: any ready `openspec/issues/<slug>/`
#     #      directory is worked into a fix PR before the changes queue. With no
#     #      issues present this is a no-op. The CURATED entry is a maintainer
#     #      committing `openspec/issues/<slug>/` directly.
#     #   2. Public ingestion (only when `features.scout.include_issues` is also
#     #      true — the default). Each pass the bot reads open GitHub issues
#     #      read-only via `gh api`, runs each through an LLM triage (the body is
#     #      UNTRUSTED public input, carried as data, never as an instruction),
#     #      dedups against open + archived issues, and posts a CANDIDATE to
#     #      chatops. It queues NOTHING — a maintainer reply of `send it` in the
#     #      candidate's thread is the promotion gate that writes
#     #      `openspec/issues/<slug>/` and authorizes the work. Issue ASSIGNEE
#     #      is not consulted; assigning an issue to the bot does nothing.
#     #
#     # `features.*` is not hot-reloadable: enabling this needs a daemon
#     # restart, not `autocoder reload`. Ingestion also needs `gh` authenticated
#     # on the host; on a failed read a WARN logs and the pass proceeds.
#     # Default: false.
#     # enabled: true
#
#     # Workspace-relative path to a custom issue-flavored implementer prompt
#     # template. Resolved via the uniform Prompt overrides table.
#     # Default: null (use the embedded `prompts/implementer-issue.md`).
#     # prompt_path: ./prompts/implementer-issue-custom.md


# Canonical-spec RAG (a21). Optional top-level block. When absent OR
# present with `enabled: false`, no embedding pipeline runs and the
# implementer's `query_canonical_specs` MCP tool returns an empty Vec
# with `error_hint: rag disabled in config`. When enabled, the daemon
# embeds every `openspec/specs/<capability>/spec.md` at workspace init
# and re-embeds affected capabilities after archives that touch
# canonical specs. The store is in-memory only (daemon restart
# re-embeds).
#
# canonical_rag:
#   enabled: true
#   provider: ollama                    # `ollama` | `openai_compatible`
#                                       # NOTE: `anthropic` is REJECTED at
#                                       # config-load — Anthropic exposes no
#                                       # embeddings API. The daemon exits
#                                       # non-zero with a clear message if you
#                                       # set `provider: anthropic` here.
#   model: nomic-embed-text             # provider-specific identifier
#   api_base_url: http://localhost:11434  # API ROOT; client appends the path
#                                       # (`/api/embed` for ollama,
#                                       # `/embeddings` for openai_compatible)
#   # api_key_env: VOYAGE_API_KEY       # required for openai_compatible
#   # api_key: { value: "..." }         # inline alternative (wins with WARN if both set)
#                                       # FORBIDDEN when provider: ollama
#   top_k: 10                           # default for tool queries; clamped [1, 100]
#   chunk_strategy: per_requirement     # per_requirement | per_scenario | per_capability
#   reembed_on_archive: true            # re-embed affected capabilities post-archive
